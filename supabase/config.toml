project_id = "ywbpbcryuvrgtewcyknp"

[auth]
site_url = "https://interview-companion-app.vercel.app"
additional_redirect_urls = [
  "https://interview-companion-app.vercel.app/**",
  "http://localhost:8080/**",
]

[auth.email]
enable_signup = true
enable_confirmations = false

# Google sign-in. The client ID and secret come from the researcher's own
# Google Cloud OAuth app (see README); set them via environment variables
# before running `supabase config push`.
[auth.external.google]
enabled = false
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
